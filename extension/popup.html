<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f11;
      color: #f0f0f4;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #2e2e36;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #7c5cfc;
    }
    .logo { font-size: 16px; font-weight: 700; }
    .body { padding: 16px; }

    .status {
      font-size: 12px;
      color: #9090a0;
      margin-bottom: 14px;
      min-height: 16px;
    }
    .status.recording { color: #ef4444; }
    .status.uploading { color: #f59e0b; }
    .status.done { color: #22c55e; }

    .timer {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 2px;
      margin: 8px 0 16px;
      font-variant-numeric: tabular-nums;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn-record { background: #7c5cfc; color: #fff; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-disabled { background: #2e2e36; color: #9090a0; cursor: not-allowed; }

    .options {
      margin-bottom: 14px;
    }
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      color: #c0c0cc;
    }
    select {
      background: #1a1a1f;
      border: 1px solid #2e2e36;
      border-radius: 6px;
      color: #f0f0f4;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type=checkbox] { cursor: pointer; accent-color: #7c5cfc; }

    .link-box {
      margin-top: 12px;
      padding: 10px;
      background: #1a1a1f;
      border: 1px solid #2e2e36;
      border-radius: 8px;
      display: none;
    }
    .link-box.show { display: block; }
    .link-url {
      font-size: 11px;
      color: #9090a0;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .btn-copy {
      width: 100%;
      padding: 7px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      background: #7c5cfc;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .btn-copy:hover { opacity: .88; }

    .progress {
      height: 3px;
      background: #2e2e36;
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }
    .progress.show { display: block; }
    .progress-bar {
      height: 100%;
      background: #7c5cfc;
      border-radius: 2px;
      transition: width .3s;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <span class="logo">ScreenRec</span>
  </div>
  <div class="body">
    <p class="status" id="status">Ready to record</p>

    <div class="options" id="optionsPanel">
      <div class="option-row">
        <span>Audio</span>
        <label>
          <input type="checkbox" id="audioCheck" checked />
          Microphone
        </label>
      </div>
      <div class="option-row">
        <span>Quality</span>
        <select id="qualitySelect">
          <option value="high">High (1080p)</option>
          <option value="medium" selected>Medium (720p)</option>
          <option value="low">Low (480p)</option>
        </select>
      </div>
    </div>

    <div class="timer" id="timer" style="display:none">00:00</div>

    <button class="btn btn-record" id="mainBtn">Start Recording</button>

    <div class="progress" id="progressWrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>

    <div class="link-box" id="linkBox">
      <div class="link-url" id="linkUrl"></div>
      <button class="btn-copy" id="copyBtn">🔗 Copy Link</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
