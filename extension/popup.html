<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #5b5bf6; --record: #ff4b4b; --record-h: #ec3a3a;
      --bg: #ffffff; --soft: #f4f5f7; --border: #e6e8eb; --border2:#d3d6db;
      --text: #1c1c28; --text2: #6b7280; --text3:#9aa1ac; --green:#22a06b;
    }
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .header {
      display: flex; align-items: center; gap: 9px;
      padding: 16px 18px 12px;
    }
    .logo-dot { width: 22px; height: 22px; border-radius: 7px;
      background: linear-gradient(135deg,#7c7cff,#5b5bf6); box-shadow:0 2px 8px rgba(91,91,246,.4); }
    .logo { font-size: 16px; font-weight: 800; letter-spacing:-.02em; flex:1; }
    .user-chip { font-size: 11px; color: var(--text2); display:flex; align-items:center; gap:6px; }
    .user-chip .av { width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px; }
    .sign-out { font-size: 16px; color: var(--text3); cursor:pointer; background:none;border:none;padding:4px 6px;border-radius:7px; }
    .sign-out:hover { background: var(--soft); color: var(--text); }
    .body { padding: 6px 18px 18px; }

    /* ── Auth ── */
    .auth-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .auth-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
    .field { margin-bottom: 11px; }
    .field label { display:block; font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight:600; }
    .field input {
      width: 100%; padding: 10px 12px; background:#fff; border: 1px solid var(--border2);
      border-radius: 9px; color: var(--text); font-size: 13px; outline: none;
    }
    .field input:focus { border-color: var(--accent); box-shadow:0 0 0 3px #eeeefe; }
    .btn-auth {
      width: 100%; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 700;
      cursor: pointer; border: none; background: var(--accent); color: #fff; margin-top: 6px;
    }
    .btn-auth:hover { background:#4b4be0; }
    .btn-auth:disabled { opacity:.55; cursor: not-allowed; }
    .toggle { font-size: 12px; color: var(--text2); text-align: center; margin-top: 12px; }
    .toggle span { color: var(--accent); font-weight:600; cursor: pointer; }
    .auth-error { font-size: 12px; color: var(--record); margin-bottom: 8px; min-height: 15px; }

    /* ── Recorder options (Loom-style rows) ── */
    .status { font-size: 12px; color: var(--text2); margin: 2px 0 12px; min-height: 14px; }
    .status.recording { color: var(--record); font-weight:600; }
    .status.uploading { color: #d9820a; }
    .status.done { color: var(--green); font-weight:600; }

    .opt-row {
      display:flex; align-items:center; gap:11px;
      background: var(--soft); border:1px solid transparent;
      border-radius: 11px; padding: 11px 13px; margin-bottom: 9px;
      cursor: pointer;
    }
    .opt-row:hover { border-color: var(--border2); }
    .opt-ic { font-size:17px; width:20px; text-align:center; }
    .opt-main { flex:1; }
    .opt-label { font-size: 13px; font-weight: 600; }
    .opt-sub { font-size: 11px; color: var(--text3); }
    .opt-row select {
      border:none; background:transparent; font-size:13px; font-weight:600; color:var(--text);
      cursor:pointer; outline:none; text-align:right;
    }
    /* toggle switch */
    .switch { position:relative; width:38px; height:22px; flex-shrink:0; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:#cfd3da; border-radius:22px; transition:.18s; }
    .slider:before { content:''; position:absolute; height:16px; width:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.18s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
    .switch input:checked + .slider { background: var(--green); }
    .switch input:checked + .slider:before { transform: translateX(16px); }

    .timer { font-size: 34px; font-weight: 800; text-align:center; letter-spacing:1px; margin: 6px 0 14px; font-variant-numeric: tabular-nums; }

    .btn-record {
      width: 100%; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; border: none; background: var(--record); color: #fff;
      display:flex; align-items:center; justify-content:center; gap:9px;
      box-shadow: 0 6px 18px rgba(255,75,75,.32);
    }
    .btn-record:hover { background: var(--record-h); }
    .btn-record .rdot { width:9px;height:9px;border-radius:50%;background:#fff; }
    .btn-stop { background:#1c1c28; box-shadow:none; }
    .btn-disabled { background:#cfd3da; color:#fff; cursor:not-allowed; box-shadow:none; }
    .limit-note { text-align:center; font-size:11px; color: var(--text3); margin-top: 9px; }

    .link-box { margin-top: 14px; padding: 12px; background: var(--soft); border-radius: 11px; display:none; }
    .link-box.show { display:block; }
    .link-url { font-size: 11px; color: var(--text2); word-break: break-all; margin-bottom: 9px; }
    .btn-open { display:block; width:100%; padding:9px; border-radius:9px; font-size:13px; font-weight:700; background:var(--accent); color:#fff; border:none; cursor:pointer; text-align:center; text-decoration:none; margin-bottom:7px; }
    .btn-open:hover { background:#4b4be0; }
    .btn-copy { width:100%; padding:8px; border-radius:9px; font-size:12px; font-weight:600; background:#fff; color:var(--text2); border:1px solid var(--border2); cursor:pointer; }
    .btn-copy:hover { background:var(--soft); color:var(--text); }
    .progress { height:4px; background:var(--soft); border-radius:3px; margin-top:11px; overflow:hidden; display:none; }
    .progress.show { display:block; }
    .progress-bar { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-dot"></div>
    <span class="logo">ScreenRec</span>
    <span class="user-chip" id="userChip"></span>
    <button class="sign-out" id="signOutBtn" style="display:none" onclick="signOut()" title="Sign out">⏻</button>
  </div>
  <div class="body">

    <!-- Auth panel -->
    <div id="authPanel">
      <div class="auth-title" id="authTitle">Sign in</div>
      <div class="auth-sub" id="authSub">to start recording</div>
      <div class="auth-error" id="authError"></div>
      <div class="field" id="nameField" style="display:none">
        <label>Name</label>
        <input type="text" id="nameInput" placeholder="Your name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" />
      </div>
      <button class="btn-auth" id="authBtn">Sign In</button>
      <div class="toggle" id="toggleAuth">No account? <span onclick="toggleMode()">Sign up</span></div>
    </div>

    <!-- Recorder panel -->
    <div id="recorderPanel" style="display:none">
      <p class="status" id="status">Ready to record</p>

      <div id="optionsPanel">
        <label class="opt-row">
          <span class="opt-ic">🎥</span>
          <span class="opt-main">
            <div class="opt-label">Camera</div>
            <div class="opt-sub">Add your webcam</div>
          </span>
          <select id="cameraSelect">
            <option value="off" selected>Off</option>
            <option value="bubble">Bubble</option>
            <option value="only">Camera only</option>
          </select>
        </label>

        <label class="opt-row">
          <span class="opt-ic">🎙️</span>
          <span class="opt-main">
            <div class="opt-label">Microphone</div>
            <div class="opt-sub">Record your voice</div>
          </span>
          <span class="switch"><input type="checkbox" id="audioCheck" checked /><span class="slider"></span></span>
        </label>

        <label class="opt-row">
          <span class="opt-ic">⚙️</span>
          <span class="opt-main">
            <div class="opt-label">Quality</div>
            <div class="opt-sub">Video resolution</div>
          </span>
          <select id="qualitySelect">
            <option value="high">1080p</option>
            <option value="medium" selected>720p</option>
            <option value="low">480p</option>
          </select>
        </label>

        <label class="opt-row">
          <span class="opt-ic">⏱️</span>
          <span class="opt-main">
            <div class="opt-label">Countdown</div>
            <div class="opt-sub">3-2-1 before start</div>
          </span>
          <span class="switch"><input type="checkbox" id="countdownCheck" checked /><span class="slider"></span></span>
        </label>
      </div>

      <div class="timer" id="timer" style="display:none">00:00</div>

      <button class="btn-record" id="mainBtn"><span class="rdot"></span> Start Recording</button>
      <div class="limit-note" id="limitNote">Free · unlimited recordings</div>

      <div class="progress" id="progressWrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

      <div class="link-box" id="linkBox">
        <div class="link-url" id="linkUrl"></div>
        <a class="btn-open" id="openBtn" href="#" target="_blank" rel="noopener">▶ Open Video</a>
        <button class="btn-copy" id="copyBtn">🔗 Copy Link</button>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
