<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VeoRec — Recording</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:#5b5bf6; --record:#ff4b4b; --record-h:#ec3a3a;
      --bg:#ffffff; --soft:#f4f5f7; --border:#e6e8eb; --border2:#d3d6db;
      --text:#1c1c28; --text2:#6b7280; --text3:#9aa1ac; --green:#22a06b;
    }
    body {
      font-family:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      letter-spacing:-.01em;
      background:var(--bg); color:var(--text);
      display:flex; align-items:center; justify-content:center; min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    .card { width:100%; max-width:380px; padding:32px 28px; text-align:center; }
    .logo { display:flex; align-items:center; justify-content:center; gap:10px; font-size:18px; font-weight:800; letter-spacing:-.02em; margin-bottom:24px; }
    .dot { width:22px; height:22px; border-radius:7px; background:linear-gradient(135deg,#7c7cff,#5b5bf6); box-shadow:0 2px 8px rgba(91,91,246,.4); }

    .status { font-size:13px; color:var(--text2); margin-bottom:20px; min-height:18px; }
    .status.recording { color:var(--record); font-weight:600; }
    .status.uploading { color:#d9820a; font-weight:600; }
    .status.done { color:var(--green); font-weight:600; }

    .timer { font-size:54px; font-weight:800; letter-spacing:2px; font-variant-numeric:tabular-nums; margin-bottom:24px; display:none; }
    .timer.show { display:block; }

    .preview-wrap { margin:0 0 18px; display:none; }
    .preview-wrap.show { display:block; }
    #previewCanvas { width:100%; border-radius:14px; background:#0b0b14; max-height:240px; object-fit:contain; }

    .btn { width:100%; padding:14px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; border:none; transition:background .15s; }
    .btn-start { background:var(--record); color:#fff; display:inline-flex; align-items:center; justify-content:center; gap:9px; box-shadow:0 6px 18px rgba(255,75,75,.3); }
    .btn-start:hover { background:var(--record-h); }
    .btn-start .rdot { width:9px; height:9px; border-radius:50%; background:#fff; }

    .controls { display:none; gap:8px; }
    .controls .btn { flex:1; padding:13px 8px; font-size:14px; }
    .btn-pause { background:var(--soft); color:var(--text); border:1px solid var(--border2); }
    .btn-pause:hover { background:#e9ebee; }
    .btn-cancel { background:#fff; color:var(--record); border:1px solid var(--border2); }
    .btn-cancel:hover { background:#fdecec; border-color:var(--record); }
    .btn-stop { background:#1c1c28; color:#fff; }
    .btn-stop:hover { background:#000; }

    .link-box { margin-top:22px; padding:16px; background:var(--soft); border-radius:14px; display:none; text-align:left; }
    .link-box.show { display:block; }
    .link-url { font-size:12px; color:var(--text2); word-break:break-all; margin-bottom:12px; }
    .btn-open { display:block; width:100%; padding:11px; border-radius:10px; font-size:14px; font-weight:700; background:var(--accent); color:#fff; border:none; cursor:pointer; text-align:center; text-decoration:none; margin-bottom:8px; }
    .btn-open:hover { background:#4b4be0; }
    .btn-copy { width:100%; padding:10px; border-radius:10px; font-size:13px; font-weight:600; background:#fff; color:var(--text2); border:1px solid var(--border2); cursor:pointer; }
    .btn-copy:hover { background:#fff; color:var(--text); border-color:var(--accent); }

    /* big Loom-style countdown */
    .countdown { position:fixed; inset:0; background:rgba(255,255,255,.96); display:none; align-items:center; justify-content:center; z-index:10; }
    .countdown.show { display:flex; }
    .countdown-num {
      width:160px; height:160px; border-radius:50%;
      background:linear-gradient(135deg,#7c7cff,#5b5bf6); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:80px; font-weight:800;
      box-shadow:0 20px 50px rgba(91,91,246,.45);
      animation:pop .9s ease-out;
    }
    @keyframes pop { 0%{transform:scale(.5);opacity:0;} 45%{transform:scale(1.08);opacity:1;} 100%{transform:scale(1);} }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="dot"></span> VeoRec</div>

    <p class="status" id="status">Preparing your recording…</p>
    <div class="timer" id="timer">00:00</div>

    <div class="preview-wrap" id="previewWrap"><canvas id="previewCanvas"></canvas></div>

    <button class="btn btn-start" id="mainBtn" style="display:none"><span class="rdot"></span> Start Recording</button>

    <div class="controls" id="controls">
      <button class="btn btn-pause" id="pauseBtn">⏸ Pause</button>
      <button class="btn btn-cancel" id="cancelBtn">✕ Cancel</button>
      <button class="btn btn-stop" id="stopBtn">⏹ Stop</button>
    </div>

    <div class="link-box" id="linkBox">
      <div class="link-url" id="linkUrl"></div>
      <a class="btn-open" id="openBtn" href="#" target="_blank" rel="noopener">▶ Open Video</a>
      <button class="btn-copy" id="copyBtn">🔗 Copy Link</button>
    </div>
  </div>

  <div class="countdown" id="countdown"><div class="countdown-num" id="countdownNum">3</div></div>

  <script src="recorder.js"></script>
</body>
</html>
