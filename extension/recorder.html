<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScreenRec — Recording</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f11;
      color: #f0f0f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #1a1a1f;
      border: 1px solid #2e2e36;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 32px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #7c5cfc; }

    .status {
      font-size: 14px;
      color: #9090a0;
      margin-bottom: 24px;
      min-height: 20px;
    }
    .status.recording { color: #ef4444; }
    .status.uploading { color: #f59e0b; }
    .status.done { color: #22c55e; }

    .timer {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      margin-bottom: 32px;
      display: none;
    }
    .timer.show { display: block; }

    .pulse {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #ef4444;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn-start { background: #7c5cfc; color: #fff; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-disabled { background: #2e2e36; color: #9090a0; cursor: not-allowed; }

    .link-box {
      margin-top: 20px;
      padding: 14px;
      background: #242429;
      border: 1px solid #2e2e36;
      border-radius: 10px;
      display: none;
    }
    .link-box.show { display: block; }
    .link-url {
      font-size: 12px;
      color: #9090a0;
      word-break: break-all;
      margin-bottom: 10px;
    }
    .btn-copy {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      background: #7c5cfc;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .btn-copy:hover { opacity: .88; }

    .options {
      margin-bottom: 24px;
      text-align: left;
    }
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      color: #c0c0cc;
    }
    select {
      background: #242429;
      border: 1px solid #2e2e36;
      border-radius: 6px;
      color: #f0f0f4;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type=checkbox] { cursor: pointer; accent-color: #7c5cfc; width: 15px; height: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="dot"></span> ScreenRec</div>

    <p class="status" id="status">Choose your recording options, then click Start.</p>
    <div class="timer" id="timer">00:00</div>

    <div class="options" id="optionsPanel">
      <div class="option-row">
        <span>Microphone</span>
        <label><input type="checkbox" id="audioCheck" checked /> On</label>
      </div>
      <div class="option-row">
        <span>Quality</span>
        <select id="qualitySelect">
          <option value="high">High (1080p)</option>
          <option value="medium" selected>Medium (720p)</option>
          <option value="low">Low (480p)</option>
        </select>
      </div>
    </div>

    <button class="btn btn-start" id="mainBtn">Start Recording</button>

    <div class="link-box" id="linkBox">
      <div class="link-url" id="linkUrl"></div>
      <button class="btn-copy" id="copyBtn">🔗 Copy Shareable Link</button>
    </div>
  </div>

  <script src="recorder.js"></script>
</body>
</html>
