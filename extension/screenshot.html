<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent:#5b5bf6; --accent-h:#4b4be0; --bg:#0f0f19; --soft:#1a1a28; --border:#2a2a3c; --text:#fff; --text2:#b9b9c8; --green:#16955f; }
    body { font-family:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text);
      -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
    .bar { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--border); }
    .brand { display:flex; align-items:center; gap:9px; font-weight:700; font-size:16px; }
    .brand img { width:26px; height:26px; border-radius:7px; }
    .spacer { flex:1; }
    main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:22px; gap:18px; }
    .hint { color:var(--text2); font-size:14px; text-align:center; max-width:460px; line-height:1.5; }
    .stage { width:100%; max-width:880px; flex:1; display:flex; align-items:center; justify-content:center;
      background:#000; border:1px solid var(--border); border-radius:14px; overflow:hidden; min-height:200px; }
    #shot { max-width:100%; max-height:62vh; display:none; }
    .empty { display:flex; flex-direction:column; align-items:center; gap:14px; color:var(--text2); padding:40px; }
    .empty svg { width:46px; height:46px; opacity:.7; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .btn { padding:12px 20px; border-radius:12px; font-size:14.5px; font-weight:700; cursor:pointer; border:none;
      display:inline-flex; align-items:center; gap:8px; font-family:inherit; }
    .btn svg { width:17px; height:17px; }
    .btn-primary { background:var(--accent); color:#fff; box-shadow:0 8px 20px rgba(91,91,246,.35); }
    .btn-primary:hover { background:var(--accent-h); }
    .btn-ghost { background:var(--soft); color:var(--text); border:1px solid var(--border); }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
    .status { font-size:13px; color:var(--text2); min-height:18px; }
    .status.ok { color:#4ade80; font-weight:600; }
    .status.err { color:#f87171; font-weight:600; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="brand"><img src="icon128.png" alt="" /> VeoRec · Screenshot</div>
    <div class="spacer"></div>
    <button class="btn btn-ghost" id="closeBtn" style="padding:9px 14px;font-size:13px">Close</button>
  </div>
  <main>
    <div class="stage">
      <canvas id="shot"></canvas>
      <div class="empty" id="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Capture your whole screen, a window, or a browser tab.</span>
      </div>
    </div>
    <div class="status" id="status"></div>
    <div class="actions" id="actions">
      <button class="btn btn-primary" id="captureBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Capture screenshot
      </button>
    </div>
    <div class="hint" id="hint">Click capture, then choose what to share. The screenshot stays on your device — copy it or download it.</div>
  </main>
  <script src="screenshot.js"></script>
</body>
</html>
